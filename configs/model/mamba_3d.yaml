# MambaDiff 3D (LaMamba-Diff: Mamba + Local Attention U-Net for Volumes)
#
# 3D adaptation: SS2D uses 6-directional scans (±D, ±H, ±W) instead of 4.
# Window attention uses 3D windows. First architecture to apply Mamba-based
# diffusion to 3D volumetric medical image generation.
#
# Override via CLI:
#   python -m medgen.scripts.train model=mamba_3d model.variant=B mode=bravo strategy=rflow
#
# With patch_size=2 on 256x256x160 volumes:
#   Stage 0: 128x128x80 = 1.3M tokens (Mamba: global context)
#   Stage 1:  64x64x40  = 163K tokens
#   Stage 2:  32x32x20  = 20K tokens  (window ≈ full attention)
#   Stage 3:  32x32x20  (no downsample)
#
# Variants (embed_dim, num_heads):
#   S:  128, 4   (~30M params)
#   B:  192, 8   (~80M params)
#   L:  256, 16  (~200M params)
#   XL: 320, 16  (~450M params)

type: mamba
spatial_dims: 3
image_size: 256
depth_size: 160
patch_size: 2
variant: B

# U-Net structure
depths: [2, 2, 2, 2]          # Blocks per encoder stage
bottleneck_depth: 2            # Blocks in bottleneck
skip: 2                        # Last N stages don't downsample

# Mamba SSM parameters
ssm_d_state: 1                 # SSM state dimension (1 is sufficient)
ssm_ratio: 2.0                 # SSM inner dimension = ssm_ratio * embed_dim

# Attention parameters
window_size: 8                 # Window size for local attention (uniform 3D)
mlp_ratio: 4.0                # FFN expansion ratio

# Conditioning (inherited from pipeline)
conditioning: concat           # concat or cross_attn
